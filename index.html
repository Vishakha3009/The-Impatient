<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vishakha's Little Adventure ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#ffe6ee,#fff5f8);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
overflow-x:hidden;
}

.container{
width:100%;
max-width:650px;
background:white;
padding:30px;
border-radius:30px;
box-shadow:0 15px 35px rgba(0,0,0,.1);
text-align:center;
animation:fadeIn .5s ease;
position:relative;
}

.progress{
width:100%;
height:12px;
background:#f3f3f3;
border-radius:50px;
overflow:hidden;
margin-bottom:25px;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff4d88,#ff85a2);
transition:.4s;
}

h1{
color:#ff4d88;
margin-bottom:15px;
}

h2{
margin-bottom:20px;
color:#444;
}

.subtitle{
font-size:18px;
line-height:1.7;
color:#666;
margin-bottom:25px;
}

.option{
display:block;
width:100%;
padding:15px;
margin:12px 0;
border:none;
border-radius:18px;
background:#fff0f5;
font-size:16px;
cursor:pointer;
transition:.25s;
}

.option:hover{
transform:translateY(-2px);
background:#ffd8e8;
}

.nextBtn{
margin-top:20px;
padding:14px 30px;
border:none;
border-radius:20px;
background:#ff4d88;
color:white;
font-size:16px;
cursor:pointer;
}

.nextBtn:hover{
opacity:.9;
}

.hearts{
position:absolute;
top:10px;
right:15px;
font-size:25px;
animation:float 2s infinite ease-in-out;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-8px);}
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.confetti{
position:fixed;
font-size:25px;
animation:fall 4s linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-100px);
opacity:1;
}
100%{
transform:translateY(100vh);
opacity:0;
}
}

.footer{
margin-top:20px;
font-size:14px;
color:#999;
}
</style>
</head>

<body>

<div class="container">

<div class="hearts">❤️✨</div>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div id="screen"></div>

</div>

<script>

const questions = [

{
question:"🌿 Which one sounds most like you?",
options:[
"🌿 Thoughtful & Calm",
"✈️ Adventurous & Spontaneous",
"🎨 Creative & Dreamy",
"😄 Fun & Playful"
]
},

{
question:"🍽️ Choose your culinary destiny",
options:[
"🍛 Indian Food",
"🥗 Strictly Diet Food",
"👑 Vishakha's Opinion Can Be Considered"
]
},

{
question:"❤️ What matters most to you in a relationship?",
options:[
"🤝 Trust",
"💬 Communication",
"🌱 Growing Together",
"🙏 Respect",
"⭐ Shared Values",
"🛡️ Loyalty"
]
},

{
question:"☕ What should we talk about on our first meeting?",
options:[
"🇺🇸 USA Life (Pros & Cons)",
"✈️ How To Explore Europe",
"🔴 Why RCB Has The Greatest Fanbase In IPL",
"🔵 How MI's Downfall Started"
]
},

{
question:"🎵 Which song can you listen to anytime?",
options:[
"🎶 Eka Dajiba Eka Dajiba",
"🕺 Rasputin",
"🚪 Knock Knock",
"🎧 Slow Motion Angreza"
]
},

{
question:"🍿 Which show/movie do you like most?",
options:[
"💘 Splitsvilla",
"⚔️ Demon Slayer",
"🏃 Bhaag Milkha Bhaag",
"❤️ Romantic Movie"
]
},

{
question:"🇺🇸 If I visit the USA, what would you offer me for breakfast?",
options:[
"🥣 Oats",
"🌮 Pav Bhaji",
"☕ Chai With Chapati",
"🍔 Junk Food"
]
},

{
question:"🚩 Which quality would instantly make you reject someone?",
options:[
"😶 Not Being Cute",
"😐 Not Being Funny",
"🏏 Being An RCB Hater",
"⚡ Not Matching My Energy"
]
},

{
question:"✨ What's your green flag?",
options:[
"😄 I can make people laugh",
"🍕 I never say no to food",
"🤝 I'm loyal to my people",
"🎯 I keep my promises"
]
},

{
question:"😄 One thing you would never get bored of?",
options:[
"😂 Laughing",
"🍕 Eating",
"🌍 Travelling",
"💬 Endless Conversations"
]
}

];

let current = 0;

function updateProgress(){
let percent = (current/(questions.length+1))*100;
document.getElementById("progressBar").style.width = percent + "%";
}

function welcome(){

document.getElementById("screen").innerHTML = `
<h1>Hi Chichu 👋</h1>

<div class="subtitle">
Instead of asking a hundred questions on WhatsApp,
I thought I'd create a tiny adventure.
<br><br>
Let's see where it takes us ❤️
</div>

<button class="nextBtn" onclick="showQuestion()">
Start The Adventure →
</button>
`;

updateProgress();
}

function showQuestion(){

if(current >= questions.length){
showDatePage();
return;
}

let q = questions[current];

let html = `
<h2>${q.question}</h2>
`;

q.options.forEach(option=>{
html += `
<button class="option" onclick="nextQuestion()">
${option}
</button>
`;
});

document.getElementById("screen").innerHTML = html;

updateProgress();
}

function nextQuestion(){
current++;
showQuestion();
}

function showDatePage(){

document.getElementById("screen").innerHTML = `

<h1>🎉 Congratulations Chichu 🎉</h1>

<div class="subtitle">
You've successfully completed Vishakha's Little Adventure!
<br><br>
I've officially learned a little more about you today.
<br><br>
Now comes the important part...
</div>

<h2>📅 Pick A Date ❤️</h2>

<button class="option">🌸 Coffee Date</button>
<button class="option">🍽️ Dinner Date</button>
<button class="option">🎬 Movie Date</button>
<button class="option">🚶 Long Walk & Endless Conversations</button>

<button class="nextBtn" onclick="finishAdventure()">
👉 Confirm My Date
</button>

`;

updateProgress();
}

function finishAdventure(){

document.getElementById("progressBar").style.width = "100%";

for(let i=0;i<40;i++){

let confetti=document.createElement("div");

confetti.className="confetti";

confetti.innerHTML=["🎉","❤️","✨","💖"][Math.floor(Math.random()*4)];

confetti.style.left=Math.random()*100+"vw";

confetti.style.animationDelay=Math.random()*2+"s";

document.body.appendChild(confetti);

setTimeout(()=>{
confetti.remove();
},4000);
}

document.getElementById("screen").innerHTML = `

<h1>❤️ Adventure Completed ❤️</h1>

<div class="subtitle">

🎉 Thank you for being a good sport and answering all the questions.

<br><br>

Now Vishakha is looking forward to meeting you and collecting the remaining answers in person. ❤️

<br><br>

⚠️ Warning:
Additional questioning may continue over chai and snacks. 😄

</div>

<div class="footer">
Made with ❤️ by Vishakha
</div>

`;
}

welcome();

</script>

</body>
</html>
